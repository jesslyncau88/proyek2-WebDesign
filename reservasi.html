  <header class="navbar">
    <div class="navbar-inner">
      <h1 class="judul">Studio<span>Foto</span></h1>
      <input type="checkbox" id="nav-toggle" class="nav-toggle">
      <label for="nav-toggle" class="nav-toggle-label">
        <span></span><span></span><span></span>

  <main>
    <div class="page-banner">
      <h2>Reservasi Studio</h2>
      <p>Isi form di bawah untuk memesan sesi foto Anda</p>
    </div>

    <div class="form-section">
      <div class="form-card">
        <h2>Buat Reservasi</h2>
        <form id="formReservasi">
          <div class="data">
            <label for="nama">Nama Lengkap</label>
            <input type="text" id="nama" placeholder="Masukkan nama Anda" required>
          </div>
          <div class="data">
            <label for="tanggal">Tanggal Sesi</label>
            <input type="date" id="tanggal" required>
          </div>
          <div class="data">
            <label for="layanan">Paket Layanan</label>
            <select id="layanan" required>
              <option value="">— Pilih Layanan —</option>
              <option>Photobooth</option>
              <option>Studio Pro</option>
              <option>High Angle</option>
              <option>Wide Angle</option>
            </select>
          </div>
          <button type="submit">Simpan Reservasi</button>
        </form>
      </div>
    </div>
  </main>

  <footer>
